name: Build & Deploy

on:
  push:
    branches:
      - main

# Allow deploying to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache public/generated content
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/public/generated
          key: ${{ runner.os }}-generated-data

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Minify routes.geojson
        run: jq -c . public/routes.geojson > /tmp/routes.geojson && mv /tmp/routes.geojson public/routes.geojson

      - name: Fetch OpenStreetMap data for peaks/trails
        run: ./scripts/fetch-osm-data.ts

      - name: Build
        run: npm run build -- --base=/mitoc-trail-viewer/
        env:
          VITE_MAPBOX_API_TOKEN: ${{ secrets.VITE_MAPBOX_API_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
